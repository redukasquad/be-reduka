version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reduka_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-reduka}
      POSTGRES_USER: ${DB_USER:-reduka}
      POSTGRES_PASSWORD: ${DB_PASS:-reduka123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reduka_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-reduka} -d ${DB_NAME:-reduka}" ]
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    container_name: reduka_redis_prod
    restart: always
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    networks:
      - reduka_network

  api:
    container_name: reduka_api_prod
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${GOLANG_PORT:-8888}:8888"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reduka_network

volumes:
  postgres_data:
  redis_data:


networks:
  reduka_network:
    driver: bridge
