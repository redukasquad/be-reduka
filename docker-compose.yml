version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: reduka_postgres
    restart: always
    environment:
      POSTGRES_DB: reduka
      POSTGRES_USER: reduka
      POSTGRES_PASSWORD: reduka123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reduka_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U reduka -d reduka" ]
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    container_name: reduka_redis
    restart: always
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    networks:
      - reduka_network

  api:
    container_name: reduka_api
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - /app/tmp
    environment:
      - DB_HOST=postgres
      - DB_USER=reduka
      - DB_PASS=reduka123
      - DB_NAME=reduka
      - DB_PORT=5432
      - GOLANG_PORT=8888
      - JWT_SECRET=d2f6c8a4e91b7c3f0a9d4b6e82c1f7a4c9e3b1d7f5a2c8e6b4f7a1c9d3e8b6f2
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_SENDER_NAME=Reduka <redukasquad@gmail.com>
      - SMTP_AUTH_EMAIL=redukasquad@gmail.com
      - SMTP_AUTH_PASSWORD=ufaq frdw gyae dkfe
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reduka_network

volumes:
  postgres_data:
  redis_data:


networks:
  reduka_network:
    driver: bridge
